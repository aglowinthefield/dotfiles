
# =============================================================================
# psmux config (Windows)
# =============================================================================
# Most settings are handled by psmux-sensible and psmux-pain-control plugins.
# Only declare plugins and settings that psmux can parse here.
# Avoid hyphenated option names — psmux converts them to $env: vars which
# PowerShell can't handle (e.g. $env:allow-rename is invalid).

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# List of plugins
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-sensible'
run-shell 'C:\Users\clearing\.tmux\plugins\psmux-sensible\psmux-sensible.ps1'
set -g @plugin 'psmux-plugins/psmux-pain-control'
run-shell 'C:\Users\clearing\.tmux\plugins\psmux-pain-control\psmux-pain-control.ps1'
set -g @kanagawa-variant 'dragon'

run '~/.tmux/plugins/ppm/ppm.ps1'

# ── Plugins (managed by tmuxpanel) ──────────────────────
set -g @plugin 'psmux-plugins/psmux-resurrect'
run-shell 'C:\Users\clearing\.tmux\plugins/psmux-resurrect/psmux-resurrect.tmux'
set -g @plugin 'psmux-plugins/psmux-continuum'
run-shell 'C:\Users\clearing\.tmux\plugins/psmux-continuum/psmux-continuum.tmux'
set -g @plugin 'psmux-plugins/psmux-theme-gruvbox'
run-shell 'C:\Users\clearing\.tmux\plugins/psmux-theme-gruvbox/psmux-theme-gruvbox.tmux'
# ── End plugins ──────────────────────────────────────
